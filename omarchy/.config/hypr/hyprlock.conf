source = ~/.config/omarchy/current/theme/hyprlock.conf

background {
    monitor =
    color = $color
    path = ~/.config/omarchy/current/background
    blur_passes = 3
}

auth {
    fingerprint:enabled = false
}

animations {
    enabled = true
}

# Password field
input-field {
    monitor =
    size = 720, 100
    position = 0, 0
    halign = center
    valign = center

    inner_color = rgba(50, 48, 47, 0.48)
    outer_color = rgba(235, 219, 178, 1)
    outline_thickness = 4

    font_family = JetBrainsMonoNL Nerd Font Mono
    font_color = rgba(235, 219, 178, 1)

    placeholder_text = Enter password…
    check_color = rgba(216, 166, 87, 1)
    fail_text = <i>$FAIL ($ATTEMPTS)</i>
    fail_color = rgba(234, 105, 98, 1)

    rounding = 8
    shadow_passes = 0
    fade_on_empty = false

    dots_size = 0.22
    dots_spacing = 0.36
    dots_center = true
}

# Lock icon
label {
    monitor =
    text = 󰌾
    color = rgba(235, 219, 178, 1)
    font_size = 20
    font_family = JetBrainsMonoNL Nerd Font Mono
    position = -300, 0
    halign = center
    valign = center
}


# Date display
label {
    monitor =
    text = cmd[update:1000] echo -e "$(LC_TIME=en_US.UTF-8 date +"%A, %d %B %Y")"
    color = rgba(235, 219, 178, 1)
    font_size = 32
    font_family = JetBrainsMonoNL Nerd Font Mono
    position = 0, 640
    halign = center
    valign = center
}

# Time display
label {
    monitor =
    text = cmd[update:1000] echo -e "$(LC_TIME=en_US.UTF-8 date +"%H:%M")"
    color = rgba(235, 219, 178, 1)
    font_size = 288
    font_family = QuinqueFive
    position = 0, 400
    halign = center
    valign = center
}

